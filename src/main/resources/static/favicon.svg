<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Box -->
  <rect x="8" y="8" width="84" height="84" rx="20" ry="20" fill="url(#boxGrad)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="8" y="8" width="84" height="42" rx="20" ry="20" fill="white" opacity="0.08"/>

  <!-- E Letter -->
  <text
    x="50"
    y="68"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="58"
    font-weight="700"
    fill="white"
    letter-spacing="-1"
  >E</text>
</svg>
